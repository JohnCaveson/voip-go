services:
  mongodb:
    image: mongo:7
    container_name: voip-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  signaling:
    build: .
    container_name: voip-signaling
    restart: unless-stopped
    ports:
      - "9321:9321"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - VOIP_PORT=9321

volumes:
  mongo_data:
