services:
  mysql:
    image: mysql:8.0
    container_name: voip-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: voip
      MYSQL_USER: voip
      MYSQL_PASSWORD: voip
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
